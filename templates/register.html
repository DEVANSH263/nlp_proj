{% extends "base.html" %}
{% block title %}Register – HateShield{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-dark text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>Create Account</h4>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="Choose a username" required autofocus />
            </div>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="you@example.com" required />
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Min 6 characters" required />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="confirm_password"
                     name="confirm_password" placeholder="Repeat password" required />
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-check-circle me-1"></i>Register
          </button>
        </form>
      </div>
      <div class="card-footer text-center py-3">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById('togglePwd').addEventListener('click', function () {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      pwd.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  });
</script>
{% endblock %}
